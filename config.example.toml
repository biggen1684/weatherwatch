# Run with -zip to find your NWS office and then input your office inside the " "
office = "NWS Tallahassee FL"
# Enter your two state abbreviate below
area = "FL"
# NWS requires a user_agent field here.  See README
user_agent = "weatherwatch (your@email.com)"
# Valid event strings come from the NWS API's "event" field
events = ["Tornado Warning", "Severe Thunderstorm Warning"]
