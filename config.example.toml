# Rename this to config.toml after adding in the below settings.

# Run with -zip to find your local NWS office by your zipcode and then add the zone code AND county code returned below.
zone = "CAZ368"
county = "CAC037"
# Add your two letter state abbreviation below.  NWS marine codes are also valid. See README.
area = "CA"
# Run with -listevents to see all the events available to filter for and add the desired events below inside quotes and comma separated.
events = ["Beach Hazards Statement", "Coastal Flood Advisory", "Coastal Flood Statement"]
