# Two-letter state abbreviation for your location (e.g. FL, AL, GA). 
# Note: weatherwatch is designed for land-based alerts only.
# NWS marine area codes are not supported. 
area = "CA"

# Your NWS forecast zone code — see "Finding Your Zone" in README
zone = "CAZ368"

# Your NWS forecast county code — see "Finding Your Zone" in README
county = "CAC037"

# Event types to notify on — see "Listing Valid Events" in README
events = [
    "Tornado Warning",
    "Severe Thunderstorm Warning",
    "Flash Flood Warning",
    "Hurricane Warning"
]